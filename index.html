<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCP/IP - Game</title>
    <meta name="description" content="Um jogo interativo e educativo para aprender como funcionam as camadas do modelo TCP/IP.">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png">
</head>
<body>
    <div class="background-animation">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <main class="game-container">
        <header>
            <h1>TCP/IP: O Jogo do Protocolo</h1>
            <p class="subtitle">Descubra como a internet envia seus dados!</p>
            <div id="progress-bar" class="progress-bar">
                <div class="step active" data-step="1">Camada de Aplicação</div>
                <div class="step" data-step="2">Camada de Transporte</div>
                <div class="step" data-step="3">Camada de Rede</div>
                <div class="step" data-step="4">A Internet (Roteamento)</div>
                <div class="step" data-step="5">Destino (Reconstrução)</div>
            </div>
        </header>

        <section id="level-area" class="level-area glass-panel">
            <!-- Dynamic content injected by JavaScript -->
        </section>

        <div id="info-panel" class="info-panel glass-panel hidden">
            <h3>Explicação: <span id="info-title"></span></h3>
            <p id="info-text"></p>
        </div>
        
    </main>

    <script src="script.js"></script>

</body>
</html>
